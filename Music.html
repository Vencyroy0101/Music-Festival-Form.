<!DOCTYPE html>
<html>
<head>
    <title>Music Festival Registration</title>
</head>
<body>

<h2>Music Festival Registration Form</h2>

<form>

    <label>Full Name:</label><br>
    <input type="text" name="name"><br><br>

    <label>Email:</label><br>
    <input type="email" name="email"><br><br>

    <label>Select Your Favorite Music Genre:</label><br>
    <select name="genre">
        <option>Pop</option>
        <option>Rock</option>
        <option>Hip Hop</option>
        <option>Classical</option>
        <option>Jazz</option>
    </select><br><br>

    <label>Choose Your Ticket Type:</label><br>
    <input type="radio" name="ticket" value="VIP"> VIP
    <input type="radio" name="ticket" value="Regular"> Regular
    <input type="radio" name="ticket" value="Student"> Student
    <br><br>

    <label>Festival Activities:</label><br>
    <input type="checkbox" name="activity"> Live Concert
    <input type="checkbox" name="activity"> Dance Show
    <input type="checkbox" name="activity"> Food Festival
    <br><br>

    <label>Special Requests:</label><br>
    <textarea rows="4" cols="30"></textarea><br><br>

    <button type="submit">Register</button>
    <button type="reset">Clear Form</button>

</form>

</body>
</html>
